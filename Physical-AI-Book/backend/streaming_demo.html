<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Chat Demo - RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .bot-message {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #667eea;
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            text-align: center;
            padding: 10px;
            font-size: 13px;
            color: #666;
            font-style: italic;
        }

        .endpoint-toggle {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .endpoint-toggle label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .endpoint-toggle input[type="radio"] {
            width: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 RAG Chatbot Streaming Demo</h1>
            <p>Ask questions about Physical-AI and Robotics</p>
        </div>

        <div class="endpoint-toggle">
            <label>
                <input type="radio" name="endpoint" value="stream" checked>
                Streaming (SSE)
            </label>
            <label>
                <input type="radio" name="endpoint" value="normal">
                Non-Streaming
            </label>
        </div>

        <div class="chat-container" id="chatContainer"></div>

        <div class="status" id="status">Ready</div>

        <div class="input-container">
            <input
                type="text"
                id="messageInput"
                placeholder="Ask about robotics, inverse kinematics, etc..."
                onkeypress="if(event.key === 'Enter') sendMessage()"
            />
            <button onclick="sendMessage()" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/v1';
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        function generateSessionId() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        const sessionId = generateSessionId();

        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            messageDiv.textContent = content;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        function updateStatus(text) {
            status.textContent = text;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Disable input
            messageInput.disabled = true;
            sendBtn.disabled = true;

            // Add user message
            addMessage(message, true);
            messageInput.value = '';

            // Check endpoint type
            const endpoint = document.querySelector('input[name="endpoint"]:checked').value;

            if (endpoint === 'stream') {
                await sendStreamingMessage(message);
            } else {
                await sendNormalMessage(message);
            }

            // Re-enable input
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        async function sendStreamingMessage(message) {
            updateStatus('Streaming response...');

            const botMessageDiv = document.createElement('div');
            botMessageDiv.className = 'message bot-message';
            chatContainer.appendChild(botMessageDiv);

            const cursor = document.createElement('span');
            cursor.className = 'streaming-cursor';
            botMessageDiv.appendChild(cursor);

            try {
                const response = await fetch(`${API_BASE}/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line in buffer

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));

                            if (data.chunk) {
                                // Remove cursor, add chunk, re-add cursor
                                cursor.remove();
                                botMessageDiv.appendChild(document.createTextNode(data.chunk));
                                botMessageDiv.appendChild(cursor);
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            } else if (data.done) {
                                cursor.remove();
                                updateStatus('Ready');
                            } else if (data.error) {
                                cursor.remove();
                                botMessageDiv.textContent = `Error: ${data.error}`;
                                botMessageDiv.style.color = 'red';
                                updateStatus('Error occurred');
                            }
                        }
                    }
                }
            } catch (error) {
                cursor.remove();
                botMessageDiv.textContent = `Error: ${error.message}`;
                botMessageDiv.style.color = 'red';
                updateStatus('Error occurred');
            }
        }

        async function sendNormalMessage(message) {
            updateStatus('Waiting for response...');

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (data.response) {
                    addMessage(data.response, false);
                    updateStatus('Ready');
                } else if (data.detail) {
                    addMessage(`Error: ${data.detail}`, false);
                    updateStatus('Error occurred');
                }
            } catch (error) {
                addMessage(`Error: ${error.message}`, false);
                updateStatus('Error occurred');
            }
        }

        // Initial message
        updateStatus('Ready - Try asking "What is inverse kinematics?"');
    </script>
</body>
</html>
